[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"
  NEXT_TELEMETRY_DISABLED = "1"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[[edge_functions]]
  path = "/api/agents/*"
  function = "next-runtime"

# Landing page A: serve static HTML at root
[[redirects]]
  from = "/"
  to = "/landing.html"
  status = 200
  force = true

# Landing page B: test variant at /landingpage
[[redirects]]
  from = "/landingpage"
  to = "/landingpage.html"
  status = 200
  force = true
